<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico/css/pico.min.css">
    <title>Medienapplikation Uebung</title>
    <link rel="manifest" href="app.webmanifest">
    <script src="https://unpkg.com/alpinejs" defer></script>
    
    <script>
      window.addEventListener("deviceorientation", handleOrientation, true);
      function handleOrientation(event) {
      let winkel = Math.abs(event.beta/180);
      output.innerText=winkel+10;

      bild.style.opacity = winkel*2;
      }

    </script>
    <script>
        // Check if service worker is supported
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('Service Worker registered', reg))
              .catch(err => console.log('Service Worker registration failed', err));
          });
        }
      
        // Request notification permission on page load
        document.addEventListener('DOMContentLoaded', function () {
          if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission().then(permission => {
              if (permission === 'granted') {
                console.log('Notification permission granted.');
              }
            });
          }
        });
      
        // Send notification data to the service worker
        function sendNotification() {
          if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              title: 'Hello!',
              body: 'This is a notification from your service worker.',
            });
          }
        }
      
        // Add event listener to the button
        document.getElementById('sendNotifyButton').addEventListener('click', sendNotification);
      </script>

  </head>
  <body x-data="{
    name: 'Collin',
    online: navigator.onLine,

  }"
    @online.window="online=true"
    @offline.window="online=false"
    >
    <main class="container">
      <h1>Willkommen <span x-text="name"></span>!</h1>
      <button @click="online = !online">Hilfe rufen</button>
      <input type="text" x-model="name">
      <!--<div x-show="online">Online</div> -->
      <div x-text="online ? 'ONLINE' : 'OFFLINE'" :style="{color: online? 'green' : 'red'}"></div>
      
      <!-- Teilen Button // Web Share API -->
      <button onclick="
      
          let data = {
            title: 'Collinswebsite',
            text: 'Die Webseite des Collin Müller',
            url: 'https://www.tu-chemnitz.de'
          };
          
          if (navigator.share && navigator.canShare(data)) {
            navigator.share(data)
            let alterText = this.innerText;
            this.innerText = 'Link kopiert!';
            setTimeout(() => this.innerText = alterText, 3000);
          }

          else {
            // keine web share api
            navigator.clipboard.writeText(data.url);

            knopf.setAttribute('data tooltip', 'link kopiert!');
          }      
      ">Teilen</button>
      <div id="output"></div>
      <button title="tooltip" onclick="
        navigator.clipboard.writeText('Nachricht');
        this.setAttribute('data tooltip', 'Nachricht kopiert');
      ">Kopieren</button>
      <button id="grantNotifyButton">Notifications erlauben</button>
      <button id="sendNotifyButton" style="display:none;">Benachrichtigung senden</button>

      <script>
        document.getElementById('grantNotifyButton').addEventListener('click', function() {
            // Berechtigung für Benachrichtigungen anfragen
            Notification.requestPermission().then(function(permission) {
                if (permission === "granted") {
                    // sendNotifyButton anzeigen
                    document.getElementById('sendNotifyButton').style.display = 'block';
                } else {
                    alert("Benachrichtigungen wurden blockiert.");
                }
            });
        });

        document.getElementById('sendNotifyButton').addEventListener('click', function() {
            // Eine neue Benachrichtigung erstellen, wenn die Berechtigung erteilt wurde
            if (navigator.serviceWorker.controller) {
                // Eine Nachricht mit den Benachrichtigungsdetails an den Service Worker senden
                navigator.serviceWorker.controller.postMessage({
                    title: "Hallo Welt!",
                    body: "Das ist eine Benachrichtigung.",
                    icon: "https://example.com/icon.png" // Optional: Ein Icon für die Benachrichtigung
                });
            } else {
                alert("Service Worker ist nicht aktiv.");
            }
        });
        </script>

      <div style="
      background-image: url(https://www-user.tu-chemnitz.de/~wilt/km/Karl-Marx-Kopf_KMS.jpg);
      background-size: contain;
      ">
        <img id="bild" src="https://www-user.tu-chemnitz.de/~wilt/km/Karl-Marx-Kopf_C.jpg"  >
      </div>
    </main>

  
  </body>
</html>
