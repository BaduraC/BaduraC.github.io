<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico/css/pico.min.css">
    <link rel="stylesheet" href="tafel.css">

    <title>Medienapplikation Uebung</title>
    <link rel="manifest" href="app.webmanifest">
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="tafel.js"></script>
</head>

<body>
    <div class="transparent-field" id="transparentField">
        <canvas id="noteCanvas"></canvas>
    </div>
    <button class="toggle-button" id="toggleButton">Toggle Overlay</button>
    <div class="swipe-up-area" id="swipeUpArea">
        Swipe up here
    </div>
    
    <h1>Welcome to My Website</h1>
    <p>This is a basic HTML website.</p>
    <script>
        let startY, endY;
        let moving = false; // Track if the mouse is being dragged
        const threshold = 50; // Minimum vertical movement required to trigger the action

        // Function to handle the start of a swipe or mouse drag
        function startAction(e) {
            startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            moving = true; // Start tracking movement
            e.preventDefault(); // Prevent default action (scroll / drag)
        }

        // Function to handle movement (for both touch and mouse)
        function moveAction(e) {
            if (moving) {
                let currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                endY = currentY;
            }
        }

        // Function to handle the end of a swipe or mouse drag
        function endAction(e) {
            if (moving && startY - endY > threshold) { // Swipe up or drag up
                document.querySelector('.transparent-field').style.display = 'block';
            }
            moving = false; // Stop tracking movement
        }

        const swipeArea = document.querySelector('.swipe-up-area');
        swipeArea.addEventListener('touchstart', startAction, false);
        swipeArea.addEventListener('touchmove', moveAction, false);
        swipeArea.addEventListener('touchend', endAction, false);

        // Mouse event listeners
        swipeArea.addEventListener('mousedown', startAction, false);
        swipeArea.addEventListener('mousemove', moveAction, false);
        swipeArea.addEventListener('mouseup', endAction, false);
    </script>
    <script>
        document.querySelector('.toggle-button').addEventListener('click', function() {
            var field = document.querySelector('.transparent-field');
            field.style.display = field.style.display === 'none' ? 'block' : 'none';
        });

        var canvas = document.getElementById('drawingCanvas');
        var ctx = canvas.getContext('2d');

        // Resize canvas to full overlay size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var drawing = false;

        function startDrawing(e) {
            drawing = true;
            draw(e); // This ensures drawing starts immediately on mousedown/touchstart
        }

        function endDrawing() {
            drawing = false;
            ctx.beginPath(); // Begin a new path to start a new stroke
        }

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'white';

            ctx.lineTo(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
        }

        // Event listeners for mouse
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', endDrawing);
        canvas.addEventListener('mousemove', draw);

        // Event listeners for touch
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchend', endDrawing);
        canvas.addEventListener('touchmove', draw);
    </script>
</body>
</html>
