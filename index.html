<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light" />

    <title>Forschungspraktikum</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="tafel.css">

    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js" defer></script>

    <link rel="manifest" href="app.webmanifest">
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="tafel.js" defer></script>
    <script type="module" src="math.js" defer></script>
    <script type="module" src="swiper-init.js" defer></script>
</head>

<body>
    <div class="transparent-field" id="transparentField">
        <canvas id="noteCanvas"></canvas>
    </div>
    <button class="toggle-button" id="toggleButton">Toggle Overlay</button>
    <div class="swipe-up-area" id="swipeUpArea">
        Swipe up here
    </div>
    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div id="task-container"></div>
            </div>
            <div class="swiper-slide">
                <div id="task-container"></div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
</body>
</html>
